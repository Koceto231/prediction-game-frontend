name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel older in-flight runs on the same branch — saves Vercel quota.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        # ESLint fails the build on real bugs (unknown JSX attributes,
        # undefined references, hook misuse) but tolerates warnings so
        # the existing soft-issue backlog doesn't block PRs.
        run: npm run lint -- --max-warnings 100

      - name: Build (production)
        # Vite build is the closest thing we have to a type-check —
        # it'll fail on syntax errors, missing imports, or broken JSX.
        run: npm run build
